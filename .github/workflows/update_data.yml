name: 📊 Auto-Update FII & DII Data

on:
  schedule:
    # 12:30 UTC = 6:00 PM IST — NSE publishes data after market close (3:30 PM IST)
    - cron: '30 12 * * 1-5'   # Monday–Friday only
  workflow_dispatch:            # Allow manual trigger from GitHub Actions tab

jobs:
  update-fii-dii-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # needed to commit data/latest.json back to repo

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install

      - name: 📡 Fetch NSE FII/DII data
        run: npm run fetch

      - name: 💾 Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json
          git diff --staged --quiet && echo "No new data today." || \
            git commit -m "data: auto-update $(date +'%d-%b-%Y %H:%M UTC')"
          git push
