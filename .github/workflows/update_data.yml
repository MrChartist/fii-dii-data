name: 📊 Auto-Update FII & DII Data

on:
  schedule:
    # FII/DII Data — after market close
    - cron: '15 10 * * 1-5'   # 3:45 PM IST
    - cron: '30 12 * * 1-5'   # 6:00 PM IST
    - cron: '00 13 * * 1-5'   # 6:30 PM IST
    # Sector Rotation — every 30 min during market hours (9:00 AM - 4:00 PM IST)
    - cron: '30 3 * * 1-5'    # 9:00 AM IST
    - cron: '0 4 * * 1-5'     # 9:30 AM IST
    - cron: '30 4 * * 1-5'    # 10:00 AM IST
    - cron: '0 5 * * 1-5'     # 10:30 AM IST
    - cron: '30 5 * * 1-5'    # 11:00 AM IST
    - cron: '0 6 * * 1-5'     # 11:30 AM IST
    - cron: '30 6 * * 1-5'    # 12:00 PM IST
    - cron: '0 7 * * 1-5'     # 12:30 PM IST
    - cron: '30 7 * * 1-5'    # 1:00 PM IST
    - cron: '0 8 * * 1-5'     # 1:30 PM IST
    - cron: '30 8 * * 1-5'    # 2:00 PM IST
    - cron: '0 9 * * 1-5'     # 2:30 PM IST
    - cron: '30 9 * * 1-5'    # 3:00 PM IST
    - cron: '0 10 * * 1-5'    # 3:30 PM IST
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 📡 Fetch FII & DII Data
        id: fetch
        run: npm run fetch
        continue-on-error: true

      - name: 📊 Fetch NSE Market Statistics
        id: fetchstats
        run: node -e "require('./scripts/fetch_data').fetchMarketStats()"
        continue-on-error: true

      - name: 🔄 Fetch Sector Returns
        id: fetchsectors
        run: node scripts/fetch_sectors.js
        continue-on-error: true

      - name: 💾 Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Auto-update: $(date +'%d-%b-%Y %H:%M IST')"
          git push
