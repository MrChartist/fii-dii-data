name: 📊 Auto-Update FII & DII Data

on:
  schedule:
    - cron: '15 10 * * 1-5'   # 3:45 PM IST
    - cron: '30 12 * * 1-5'   # 6:00 PM IST
    - cron: '00 13 * * 1-5'   # 6:30 PM IST
  workflow_dispatch:

jobs:
  update-fii-dii-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📡 Fetch NSE FII/DII data
        id: fetch
        run: npm run fetch

      - name: 📊 Fetch NSE Market Statistics
        id: fetchstats
        run: node -e "require('./scripts/fetch_data').fetchMarketStats()"
        continue-on-error: true

      - name: 💾 Commit updated data
        if: steps.fetch.outcome == 'success'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json data/market-stats.json
          if git diff --staged --quiet; then
            echo "ℹ️ No new data today (market likely closed)."
          else
            git commit -m "data: auto-update $(date +'%d-%b-%Y %H:%M UTC')"
            git push
          fi
